<head>
	<script src="./qPact.js"></script>
	<style>
		body {
			font-size: 24px;
		}
	</style>
</head>
<c-app full></c-app>
<script>
	class App extends Component {
		load() {
			[this.textarea, this.render] = this.q('<flex full>').q(['<textarea>', '<div>']);
			this.render.Q((this.textarea.value = '<h2>qPact playground</h2>'));
			this.textarea.oninput = () => this.render.Q(this.textarea.value);
		}
	}
	//qPact.Pact.defineElement('c-app', App);
</script>
