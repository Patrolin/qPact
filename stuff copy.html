<!DOCTYPE html>
<html>
	<head>
		<style>
			/* black magic */
			* {
				box-sizing: border-box;
				padding: 0;
				margin: 0;
			}
			html,
			body {
				width: 100%;
				height: 100%;
			}
			body * {
				padding: 3px;
				margin: 0;
				display: inline-block;
				padding: 0.5em;
			}
			center {
				border: 1px solid black;
			}
			script {
				display: none;
			}
			down,
			right {
				display: inline-flex;
				gap: 0.5em;
			}
			down > *,
			right > * {
				flex: 1 1 0;
			}
			down {
				flex-direction: column;
			}
			center {
				display: inline-flex;
				flex-direction: column;
				justify-content: center;
				align-items: center;
			}
			center > * {
				flex-basis: content;
				flex-grow: 0;
				flex-shrink: 1;
			}
			[wide] {
				width: 100%;
			}
			[tall] {
				width: 100%;
			}

			/* style */
			body {
				font-family: monospace;
				background: rgb(161, 152, 168);
			}
			past,
			present,
			future {
				background: #646464;
			}
			past {
				color: red;
			}
			present {
				color: greenyellow;
			}
			future {
				color: yellow;
			}
		</style>
	</head>
	<body>
		<down wide>
			<right>
				<center>Css</center>
				<center>Html</center>
				<center>Js</center>
			</right>
			<right>
				<center><present>/* ... */</present></center>
				<center>
					<present>
						<div>&lt;--</div>
						...
						<div>--&gt;</div>
					</present>
				</center>
				<down>
					<center><present>/* ... */</present></center>
					<center><present>//&nbsp;...</present></center>
				</down>
			</right>
			<right>
				<center></center>
				<center><present>&lt;!DOCTYPE&gt;</present></center>
				<center></center>
			</right>
			<right>
				<right>
					<center>font</center>
					<down>
						<center>
							<present>
								<div>font-family:</div>
								...;
							</present>
						</center>
						<center>
							<present>
								<div>font-size:</div>
								...;
							</present>
						</center>
						<center>
							<present>
								<div>font-weight:</div>
								...;
							</present>
						</center>
					</down>
				</right>
				<down>
					<center></center>
					<center></center>
					<center><present>&lt;b&gt;</present></center>
				</down>
				<center></center>
			</right>
		</down>
	</body>
</html>
